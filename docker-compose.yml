version: '3.8'

services:
  # The Database "Team Member"
  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=myapp
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Your Python/Flask App
  web-app:
    build: .
    container_name: flask-app
    restart: always
    expose:
      - "5000"
    depends_on:
      - db  # Tells Docker: Start the DB before starting the App

  # The Nginx Bodyguard
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-app

volumes:
  postgres_data: # This keeps your data safe even if containers stop
